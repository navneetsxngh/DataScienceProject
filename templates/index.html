<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Quality Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a0f 0%, #3d1020 50%, #1a0a0f 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .wine-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0c9d4;
      letter-spacing: 0.02em;
      margin-bottom: 0.35rem;
    }

    .card-header p {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Two-column grid for inputs */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    /* Full-width single field */
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="number"] {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #c0392b;
      background: rgba(192, 57, 43, 0.1);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.2);
    }

    /* Validation highlight */
    input:invalid:not(:placeholder-shown) {
      border-color: #e74c3c;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #c0392b, #922b21);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      margin-bottom: 1rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192, 57, 43, 0.4);
    }

    .submit-btn:active { transform: translateY(0); opacity: 0.9; }

    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.25);
    }

    /* Train link */
    .train-link {
      display: block;
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      transition: color 0.15s;
    }

    .train-link:hover { color: rgba(255, 255, 255, 0.65); }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="wine-icon">🍷</div>
    <h1>Wine Quality Predictor</h1>
    <p>Red Wine · ElasticNet Model</p>
  </div>

  <form action="/predict" method="post">
    <div class="form-grid">

      <div class="field">
        <label for="fixed_acidity">Fixed Acidity</label>
        <input type="number" step="any" name="fixed_acidity" id="fixed_acidity"
               placeholder="e.g. 7.4" required />
      </div>

      <div class="field">
        <label for="volatile_acidity">Volatile Acidity</label>
        <input type="number" step="any" name="volatile_acidity" id="volatile_acidity"
               placeholder="e.g. 0.70" required />
      </div>

      <div class="field">
        <label for="citric_acid">Citric Acid</label>
        <input type="number" step="any" name="citric_acid" id="citric_acid"
               placeholder="e.g. 0.00" required />
      </div>

      <div class="field">
        <label for="residual_sugar">Residual Sugar</label>
        <input type="number" step="any" name="residual_sugar" id="residual_sugar"
               placeholder="e.g. 1.9" required />
      </div>

      <div class="field">
        <label for="chlorides">Chlorides</label>
        <input type="number" step="any" name="chlorides" id="chlorides"
               placeholder="e.g. 0.076" required />
      </div>

      <div class="field">
        <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
        <input type="number" step="any" name="free_sulfur_dioxide" id="free_sulfur_dioxide"
               placeholder="e.g. 11.0" required />
      </div>

      <div class="field">
        <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
        <input type="number" step="any" name="total_sulfur_dioxide" id="total_sulfur_dioxide"
               placeholder="e.g. 34.0" required />
      </div>

      <div class="field">
        <label for="density">Density</label>
        <input type="number" step="any" name="density" id="density"
               placeholder="e.g. 0.9978" required />
      </div>

      <div class="field">
        <label for="pH">pH</label>
        <input type="number" step="any" name="pH" id="pH"
               placeholder="e.g. 3.51" required />
      </div>

      <div class="field">
        <label for="sulphates">Sulphates</label>
        <input type="number" step="any" name="sulphates" id="sulphates"
               placeholder="e.g. 0.56" required />
      </div>

      <div class="field full">
        <label for="alcohol">Alcohol (%)</label>
        <input type="number" step="any" name="alcohol" id="alcohol"
               placeholder="e.g. 9.4" required />
      </div>

    </div>

    <button type="submit" class="submit-btn">Predict Quality</button>
  </form>

  <p class="footer-note">Scores are predicted on a scale of 0 – 10</p>
  <a href="/train" class="train-link">Retrain model →</a>
</div>

</body>
</html>
